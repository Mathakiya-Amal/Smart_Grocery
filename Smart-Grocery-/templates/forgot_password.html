<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password | Smart Grocery</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
    darkMode: "class",
    theme: { extend: { colors: { "primary": "#13ec13", "background-light": "#f6f8f6", "background-dark": "#102210" }, fontFamily: { "display": ["Work Sans"] }, borderRadius: {"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"} } },
}
</script>
<style>
body { font-family: 'Work Sans', sans-serif; }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen">
<header class="w-full border-b border-gray-200 bg-white px-6 md:px-12 py-4 flex items-center justify-between sticky top-0 z-50">
  <a href="/" class="flex items-center gap-2 text-[#0d1b0d]">
    <div class="size-8 text-primary"><svg fill="currentColor" viewBox="0 0 48 48"><path d="M4 42.4379C4 42.4379 14.0962 36.0744 24 41.1692C35.0664 46.8624 44 42.2078 44 42.2078L44 7.01134C44 7.01134 35.068 11.6577 24.0031 5.96913C14.0971 0.876274 4 7.27094 4 7.27094L4 42.4379Z"/></svg></div>
    <h2 class="text-xl font-bold leading-tight tracking-tight">Smart Grocery</h2>
  </a>
</header>

<main class="flex flex-col items-center justify-center px-4 py-12 md:py-20">
  <div class="w-full max-w-md bg-white rounded-xl shadow-xl overflow-hidden border border-gray-100">
    <div class="p-8">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Password Recovery</h1>
        <p class="text-gray-500">Enter your email and we'll send a reset link.</p>
      </div>

      {% if error %}
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm font-medium">{{ error }}</div>
      {% endif %}
      
      {% if success %}
      <div class="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm font-medium">{{ success }}</div>
      {% else %}
      <form method="POST" action="/forgot-password" class="space-y-5">
        <div class="space-y-1.5">
          <label class="block text-sm font-medium text-gray-700" for="email">Email Address</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400 text-xl">mail</span>
            <input class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-gray-900 focus:ring-2 focus:ring-primary focus:border-transparent outline-none" id="email" name="email" placeholder="name@example.com" type="email" required/>
          </div>
        </div>
        <button class="w-full py-3.5 bg-primary hover:bg-opacity-90 text-black font-bold rounded-lg shadow-md transition-all flex items-center justify-center gap-2" type="submit">
          <span>Send Recovery Link</span>
        </button>
      </form>
      {% endif %}
    </div>
    <div class="bg-gray-50 p-6 text-center border-t border-gray-100">
      <p class="text-sm text-gray-600">
        Remember your password? <a href="/login" class="text-primary font-bold hover:underline">Log in</a>
      </p>
    </div>
  </div>
</main>

<div class="fixed top-0 right-0 -z-10 opacity-20 pointer-events-none">
  <svg fill="none" height="400" viewBox="0 0 400 400" width="400"><circle cx="300" cy="100" fill="url(#g1)" r="150"/><defs><linearGradient id="g1" x1="150" x2="300" y1="100" y2="250"><stop stop-color="#13ec13"/><stop offset="1" stop-color="#13ec13" stop-opacity="0"/></linearGradient></defs></svg>
</div>

</body>
</html>
